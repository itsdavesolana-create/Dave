<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAVE</title>

<style>

body{
margin:0;
background:#0e0e0e;
font-family:Arial, Helvetica, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
max-width:400px;
padding:20px;
}

img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

h1{
margin:10px 0;
font-size:40px;
}

.ca{
background:#1c1c1c;
padding:12px;
border-radius:10px;
font-size:14px;
word-break:break-all;
margin-top:10px;
}

button{
margin-top:15px;
padding:14px 20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
width:100%;
}

.buy{
background:white;
color:black;
font-weight:bold;
}

.copy{
background:#2c2c2c;
color:white;
}

</style>

</head>

<body>

<div class="container">

<img src="Dave.png" alt="Dave">

<h1>DAVE</h1>

<div class="ca" id="ca">
PASTE_YOUR_CONTRACT_ADDRESS_HERE
</div>

<button class="buy"
onclick="window.open('PASTE_BUY_LINK_HERE')">
BUY DAVE
</button>

<button class="copy" onclick="copyCA()">
COPY CA
</button>

</div>

<script>

function copyCA(){
let ca = document.getElementById("ca").innerText
navigator.clipboard.writeText(ca)
alert("CA copied")
}

</script>

</body>
  </html>
